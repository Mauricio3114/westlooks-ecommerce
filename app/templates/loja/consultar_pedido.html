{% extends "loja/base_loja.html" %}

{% block title %}
Consultar Pedido | WestLooks
{% endblock %}

{% block content %}

<style>

.consulta-wrap{
    max-width:700px;
    margin:60px auto;
    padding:0 20px;
}

.consulta-card{
    background:#fff;
    border-radius:30px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.consulta-card h1{
    font-weight:900;
    margin-bottom:10px;
}

.consulta-card p{
    color:#64748b;
    margin-bottom:30px;
}

.btn-west{
    width:100%;
    border:none;
    padding:16px;
    border-radius:16px;
    background:#d4af37;
    font-weight:900;
}

</style>

<div class="consulta-wrap">

    <div class="consulta-card">

        <h1>
            Consultar Pedido
        </h1>

        <p>
            Digite o número do pedido e CPF utilizado na compra.
        </p>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label fw-bold">
                    Número do Pedido
                </label>

                <input
                    type="number"
                    name="pedido"
                    class="form-control form-control-lg"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label fw-bold">
                    CPF
                </label>

                <input
                    type="text"
                    id="cpf"
                    name="cpf"
                    class="form-control form-control-lg"
                    required>

            </div>

            <button class="btn-west">

                Consultar Pedido

            </button>

        </form>

    </div>

</div>

<script>

const cpf = document.getElementById('cpf');

cpf.addEventListener('input', function(){

    let v = this.value.replace(/\D/g,'');

    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');

    this.value = v;

});

</script>

{% endblock %}
