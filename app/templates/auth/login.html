{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-body">

                <h3 class="text-center mb-4">
                    Login WestLooks
                </h3>

                <form method="POST">

                    <div class="mb-3">
                        <label>E-mail</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        <input
                            type="password"
                            name="senha"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark w-100">
                        Entrar
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
